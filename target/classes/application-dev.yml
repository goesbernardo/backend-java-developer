spring:
  datasource:
    url: jdbc:h2:mem:tvshow-db
    driver-class-name: org.h2.Driver
    username: root
    password: root

  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: false
  main:
    allow-circular-references: true

app:
  jwt:
    issuer: example-auth
    expiration-minutes: 120
    secret: "change-me-in-prod-please-32-bytes-minimum-aaaaaaaaaaaaaa"

logging:
  level:
    org.springframework.security: DEBUG
    org.hibernate.SQL: INFO
